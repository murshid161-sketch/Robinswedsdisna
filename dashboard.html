<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robins & Disna — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;font-family:'Montserrat',sans-serif;color:#2d2010;min-height:100vh}
:root{--gold:#c9a84c;--gold-dim:#8b6914;--dark:#1a1410;--cream:#faf6f0}

/* LOGIN */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark)}
.login-box{text-align:center;padding:3rem 2rem;max-width:340px;width:100%}
.login-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:2rem;color:#fff;margin-bottom:.3rem}
.login-sub{font-size:.65rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:2rem}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:1rem;color:#fff;font-family:'Montserrat',sans-serif;font-size:.9rem;outline:none;margin-bottom:1rem;text-align:center;letter-spacing:.1em}
.login-btn{width:100%;background:transparent;border:1px solid rgba(201,168,76,.5);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;padding:1rem;cursor:pointer;border-radius:4px}
.login-err{color:#e07070;font-size:.75rem;margin-top:.5rem;min-height:1rem}

/* DASHBOARD */
#dashboard{display:none;padding:1.5rem 1rem 4rem}
.dash-header{background:var(--dark);color:#fff;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem;text-align:center}
.dash-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.8rem;color:var(--gold)}
.dash-sub{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:.3rem}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border-radius:10px;padding:1.2rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--gold-dim);line-height:1}
.stat-label{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-top:.4rem}

/* TABS */
.tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.tab{flex:1;background:#fff;border:1px solid rgba(139,105,20,.2);border-radius:6px;padding:.7rem .5rem;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#888;cursor:pointer;text-align:center;transition:all .2s}
.tab.active{background:var(--dark);color:var(--gold);border-color:var(--dark)}

/* CARDS */
.card{background:#fff;border-radius:8px;padding:1.2rem;margin-bottom:.75rem;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.card-name{font-family:'Montserrat',sans-serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:.4rem}
.card-msg{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:#2d2010;line-height:1.5;margin-bottom:.3rem}
.card-meta{font-size:.6rem;color:#aaa}
.card-guests{font-size:1.1rem;font-family:'Cormorant Garamond',serif;color:#2d2010;margin-bottom:.3rem}

/* GUEST LINK TOOL */
.link-tool{background:#fff;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.link-tool h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--dark);margin-bottom:1rem}
.link-input{width:100%;border:1px solid rgba(139,105,20,.25);border-radius:6px;padding:.8rem;font-family:'Montserrat',sans-serif;font-size:.85rem;color:#2d2010;outline:none;margin-bottom:.75rem}
.link-output{background:#f5f0e8;border:1px solid rgba(139,105,20,.2);border-radius:6px;padding:.75rem;font-size:.75rem;color:#555;word-break:break-all;min-height:2.5rem;margin-bottom:.75rem;line-height:1.5}
.btn-row{display:flex;gap:.5rem}
.action-btn{flex:1;background:transparent;border:1px solid rgba(139,105,20,.4);color:var(--gold-dim);font-family:'Montserrat',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.75rem .5rem;cursor:pointer;border-radius:4px;transition:all .2s}
.action-btn.primary{background:var(--dark);border-color:var(--dark);color:var(--gold)}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:#aaa;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.1rem}

.section-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--dark);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(139,105,20,.15)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <p class="login-sub">Dashboard</p>
    <p class="login-title">Robins & Disna</p>
    <input class="login-input" type="password" id="pwdInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ACCESS DASHBOARD</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <p class="dash-title">Robins &amp; Disna</p>
    <p class="dash-sub">Betrothal · 02 May 2026</p>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statWishes">—</div>
      <div class="stat-label">Wishes</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statRsvp">—</div>
      <div class="stat-label">RSVPs</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statGuests">—</div>
      <div class="stat-label">Total Guests</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDays">—</div>
      <div class="stat-label">Days Left</div>
    </div>
  </div>

  <!-- GUEST LINK GENERATOR -->
  <div class="link-tool">
    <h3>🔗 Personalised Invite Link</h3>
    <input class="link-input" type="text" id="guestNameInput" placeholder="Enter guest name (e.g. Arun)" oninput="generateLink()">
    <div class="link-output" id="generatedLink">Enter a name above to generate link…</div>
    <div class="btn-row">
      <button class="action-btn" onclick="copyLink()">📋 Copy Link</button>
      <button class="action-btn primary" onclick="shareWhatsApp()">💬 WhatsApp</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('rsvp')">RSVPs</div>
    <div class="tab" onclick="showTab('wishes')">Wishes</div>
  </div>

  <!-- RSVP LIST -->
  <div id="tabRsvp">
    <p class="section-title">Guest Responses</p>
    <div id="rsvpList"><div class="empty">Loading…</div></div>
  </div>

  <!-- WISHES LIST -->
  <div id="tabWishes" style="display:none">
    <p class="section-title">Messages & Blessings</p>
    <div id="wishesList"><div class="empty">Loading…</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const PASSWORD = 'robinsdisna2026';
const BASE_URL = window.location.href.replace('dashboard.html','index.html');

firebase.initializeApp({
  apiKey: "AIzaSyB41fvxvl1KeHOro6WKJ72o22izuCpJ-b4",
  authDomain: "yaseen-jumana-wedding.firebaseapp.com",
  databaseURL: "https://yaseen-jumana-wedding-default-rtdb.firebaseio.com",
  projectId: "yaseen-jumana-wedding",
  storageBucket: "yaseen-jumana-wedding.firebasestorage.app",
  messagingSenderId: "355557621111",
  appId: "1:355557621111:web:d0b78c34bfe5a53b69f572"
});
const db = firebase.database();

// LOGIN
function login() {
  const pwd = document.getElementById('pwdInput').value;
  if(pwd === PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    initDashboard();
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password.';
  }
}

// COUNTDOWN
const diff = new Date('2026-05-02T11:00:00+05:30') - new Date();
document.getElementById('statDays').textContent = Math.max(0, Math.floor(diff/86400000));

// LINK GENERATOR
function generateLink() {
  const name = document.getElementById('guestNameInput').value.trim();
  if(!name) { document.getElementById('generatedLink').textContent = 'Enter a name above to generate link…'; return; }
  const url = BASE_URL + '?guest=' + encodeURIComponent(name);
  document.getElementById('generatedLink').textContent = url;
}
function copyLink() {
  const txt = document.getElementById('generatedLink').textContent;
  if(txt.startsWith('Enter')) return;
  navigator.clipboard.writeText(txt).then(() => alert('Link copied!'));
}
function shareWhatsApp() {
  const name = document.getElementById('guestNameInput').value.trim();
  const url = document.getElementById('generatedLink').textContent;
  if(!name || url.startsWith('Enter')) { alert('Enter a guest name first.'); return; }
  const msg = `Dear ${name},\n\nYou are warmly invited to the Betrothal of\n*Robins Austine Mathews & Disna Joseph*\n\n📅 2nd May 2026, 11:00 AM\n⛪ St. Mary's Church, Thenhipalam\n🎊 Reception: Century Auditorium, Chelari\n\nOpen your personalised invitation:\n${url}`;
  window.open('https://wa.me/919446470515?text=' + encodeURIComponent(msg), '_blank');
}

// TABS
function showTab(t) {
  document.getElementById('tabRsvp').style.display = t==='rsvp' ? 'block' : 'none';
  document.getElementById('tabWishes').style.display = t==='wishes' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='rsvp')||(i===1&&t==='wishes')));
}

// LOAD DATA
function initDashboard() {
  // RSVP
  db.ref('robins-disna/rsvp').orderByChild('ts').on('value', snap => {
    const list = document.getElementById('rsvpList');
    const items = [];
    snap.forEach(c => items.unshift(c.val()));
    document.getElementById('statRsvp').textContent = items.length;
    const totalGuests = items.reduce((s,i) => s + (parseInt(i.guests)||1), 0);
    document.getElementById('statGuests').textContent = totalGuests;
    if(!items.length) { list.innerHTML = '<div class="empty">No RSVPs yet.</div>'; return; }
    list.innerHTML = items.map(r => `
      <div class="card">
        <div class="card-name">${r.name}</div>
        <div class="card-guests">👥 ${r.guests} guest${r.guests>1?'s':''} attending</div>
        <div class="card-meta">${r.time||''}</div>
      </div>`).join('');
  });

  // WISHES
  db.ref('robins-disna/wishes').orderByChild('ts').on('value', snap => {
    const list = document.getElementById('wishesList');
    const items = [];
    snap.forEach(c => items.unshift(c.val()));
    document.getElementById('statWishes').textContent = items.length;
    if(!items.length) { list.innerHTML = '<div class="empty">No wishes yet.</div>'; return; }
    list.innerHTML = items.map(w => `
      <div class="card">
        <div class="card-name">${w.name}</div>
        <div class="card-msg">"${w.msg}"</div>
        <div class="card-meta">${w.time||''}</div>
      </div>`).join('');
  });
}
</script>
</body>
</html>
